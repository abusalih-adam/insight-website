<!DOCTYPE html>
<html>
<head><title>Academy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h2>Enroll</h2>
<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<select id="course">
<option>Excel</option>
<option>MEAL</option>
</select><br>
<button onclick="enroll()">Enroll</button>

<h2>Login</h2>
<input id="loginEmail" placeholder="Email"><br>
<input id="loginPassword" placeholder="Password"><br>
<button onclick="login()">Login</button>

<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function enroll(){
 const name = nameInput.value;
 const email = emailInput.value;
 const course = courseInput.value;

 await client.from("enrollments").insert([{name,email,course}]);

 localStorage.setItem("examUser", JSON.stringify({name,email,course}));
 window.location.href="exam.html";
}

async function login(){
 const email = loginEmail.value;
 const password = loginPassword.value;

 const {data} = await client.from("users").select("*").eq("email",email).single();

 if(!data || data.password!==password){alert("fail");return;}

 localStorage.setItem("user", JSON.stringify(data));

 if(data.role==="admin"){window.location.href="admin.html";}
 else{window.location.href="student.html";}
}
</script>

</body>
</html>

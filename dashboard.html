<!DOCTYPE html>
<html>
<head>
  <title>INsight Dashboard</title>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0b172b;
      color: white;
    }

    h1 { margin-bottom: 20px; }

    button {
      padding: 10px 16px;
      margin: 10px 10px 20px 0;
      cursor: pointer;
      border-radius: 8px;
      border: none;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      line-height: 1.6;
    }

    canvas {
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h1>📊 INsight Dashboard</h1>

<button onclick="exportAll()">📥 Export ALL Data</button>

<h2>Service Requests</h2>
<div id="services"></div>

<h2>Training Registrations</h2>
<div id="training"></div>

<h2>Course Enrollments</h2>
<div id="courses"></div>

<h2>📈 Analytics</h2>
<canvas id="myChart"></canvas>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* 🔐 SIMPLE LOGIN */
const password = prompt("Enter dashboard password:");
if (password !== "admin123") {
  alert("Access denied");
  window.location.href = "/";
}

/* 🔌 CONNECT */
const client = supabase.createClient(
  "https://xtlvhdtmocshycbunoki.supabase.co",
  "sb_publishable_mY1y5Sju44l-M4prPHvajQ_n_UznjaD"
);

/* 📊 LOAD DATA */

async function loadServices() {
  const { data } = await client.from("service_requests").select("*");

  document.getElementById("services").innerHTML =
    data.map(d => `
      <div class="card">
        <strong>${d.name}</strong><br>
        Org: ${d.organization}<br>
        Service: ${d.service}<br>
        Details: ${d.details}<br>
        Date: ${new Date(d.created_at).toLocaleString()}
      </div>
    `).join("");

  return data;
}

async function loadTraining() {
  const { data } = await client.from("training_registrations").select("*");

  document.getElementById("training").innerHTML =
    data.map(d => `
      <div class="card">
        <strong>${d.name}</strong><br>
        Email: ${d.email}<br>
        Training: ${d.training}<br>
        Date: ${new Date(d.created_at).toLocaleString()}
      </div>
    `).join("");
}

async function loadCourses() {
  const { data } = await client.from("course_enrollments").select("*");

  document.getElementById("courses").innerHTML =
    data.map(d => `
      <div class="card">
        <strong>${d.name}</strong><br>
        Email: ${d.email}<br>
        Course: ${d.course}<br>
        Date: ${new Date(d.created_at).toLocaleString()}
      </div>
    `).join("");
}

/* 📥 EXPORT ALL DATA */

function exportAll() {
  Promise.all([
    client.from("service_requests").select("*"),
    client.from("training_registrations").select("*"),
    client.from("course_enrollments").select("*")
  ]).then(([services, training, courses]) => {

    let csv = "=== SERVICE REQUESTS ===\n";
    csv += "Name,Organization,Service,Details,Date\n";

    services.data.forEach(r => {
      csv += `${r.name},${r.organization},${r.service},${r.details},${r.created_at}\n`;
    });

    csv += "\n=== TRAINING REGISTRATIONS ===\n";
    csv += "Name,Email,Training,Date\n";

    training.data.forEach(r => {
      csv += `${r.name},${r.email},${r.training},${r.created_at}\n`;
    });

    csv += "\n=== COURSE ENROLLMENTS ===\n";
    csv += "Name,Email,Course,Date\n";

    courses.data.forEach(r => {
      csv += `${r.name},${r.email},${r.course},${r.created_at}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "INsight_All_Data.csv";
    a.click();
  });
}

/* 📈 CHART */

async function loadChart() {
  const data = await loadServices();

  const counts = {};
  data.forEach(d => {
    counts[d.service] = (counts[d.service] || 0) + 1;
  });

  new Chart(document.getElementById("myChart"), {
    type: "bar",
    data: {
      labels: Object.keys(counts),
      datasets: [{
        label: "Requests",
        data: Object.values(counts)
      }]
    }
  });
}

/* 🚀 INIT */

loadServices();
loadTraining();
loadCourses();
loadChart();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>INsight Dashboard</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0b172b;
      color: white;
    }
    h1 { margin-bottom: 20px; }
    button {
      padding: 10px 16px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .card {
      background: rgba(255,255,255,0.08);
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>📊 INsight Dashboard</h1>

<button onclick="exportServices()">📥 Export Service Requests</button>

<h2>Service Requests</h2>
<div id="services"></div>

<h2>Training Registrations</h2>
<div id="training"></div>

<h2>Course Enrollments</h2>
<div id="courses"></div>

<h2>📊 Analytics</h2>
<canvas id="myChart"></canvas>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* 🔐 LOGIN PROTECTION */
const password = prompt("Enter dashboard password:");
if (password !== "admin123") {
  alert("Access denied");
  window.location.href = "/";
}

/* 🔌 CONNECT */
const client = supabase.createClient(
  "https://xtlvhdtmocshycbunoki.supabase.co",
  "sb_publishable_mY1y5Sju44l-M4prPHvajQ_n_UznjaD"
);

/* 📊 LOAD DATA */
async function loadServices() {
  const { data } = await client.from("service_requests").select("*");

  document.getElementById("services").innerHTML =
    data.map(d => `<div class="card">${d.name} - ${d.service}</div>`).join("");

  return data;
}

async function loadTraining() {
  const { data } = await client.from("training_registrations").select("*");

  document.getElementById("training").innerHTML =
    data.map(d => `<div class="card">${d.name} - ${d.training}</div>`).join("");
}

async function loadCourses() {
  const { data } = await client.from("course_enrollments").select("*");

  document.getElementById("courses").innerHTML =
    data.map(d => `<div class="card">${d.name} - ${d.course}</div>`).join("");
}

/* 📥 EXPORT CSV */
function exportServices() {
  client.from("service_requests").select("*").then(({ data }) => {
    let csv = "Name,Organization,Service,Details\n";

    data.forEach(row => {
      csv += `${row.name},${row.organization},${row.service},${row.details}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "service_requests.csv";
    a.click();
  });
}

/* 📈 CHART */
async function loadChart() {
  const data = await loadServices();

  const counts = {};
  data.forEach(d => {
    counts[d.service] = (counts[d.service] || 0) + 1;
  });

  new Chart(document.getElementById("myChart"), {
    type: "bar",
    data: {
      labels: Object.keys(counts),
      datasets: [{
        label: "Requests",
        data: Object.values(counts)
      }]
    }
  });
}

/* 🚀 INIT */
loadServices();
loadTraining();
loadCourses();
loadChart();

</script>

</body>
</html>

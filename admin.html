<!DOCTYPE html>
<html>
<head><title>Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h2>Admin Panel</h2>
<table id="tbl"></table>

<script>
const SUPABASE_URL="YOUR_URL";
const SUPABASE_KEY="YOUR_KEY";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

async function load(){
 const {data}=await client.from("exam_results").select("*");
 let html="";
 data.forEach(r=>{
  html+=`<tr><td>${r.email}</td><td>${r.course}</td><td>${r.score}</td>
  <td><button onclick="approve('${r.email}','${r.course}')">Approve</button></td></tr>`;
 });
 tbl.innerHTML=html;
}

async function approve(email,course){
 const name=prompt("name");
 const pass=prompt("pass");

 await client.from("users").insert([{name,email,password:pass,role:"student",course_completed:course,payment_status:"paid"}]);
 alert("done");
}

load();
</script>

</body>
</html>

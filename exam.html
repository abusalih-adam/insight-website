<!DOCTYPE html>
<html>
<head><title>Exam</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h2>Exam</h2>
<div id="questions"></div>
<button onclick="submitExam()">Submit</button>

<script>
const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const user = JSON.parse(localStorage.getItem("examUser"));

const exams = {
 "Excel":[{q:"2+2?",a:"4"}],
 "MEAL":[{q:"MEAL?",a:"monitor"}]
};

const qs = exams[user.course]||[];
let html="";
qs.forEach((q,i)=>{
 html+=`<p>${q.q}</p><input id="q${i}">`;
});
questions.innerHTML=html;

async function submitExam(){
 let score=0;
 qs.forEach((q,i)=>{
  if(document.getElementById("q"+i).value.includes(q.a)) score++;
 });

 await client.from("exam_results").insert([{email:user.email,course:user.course,score}]);

 alert("done");
 window.location.href="academy.html";
}
</script>

</body>
</html>
